<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4fc2"/>
      <stop offset="100%" stop-color="#082a6a"/>
    </linearGradient>
    <linearGradient id="waveGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a8d0ff" stop-opacity="0.8"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
    <!-- Subtle inner shadow -->
    <filter id="innerLight" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="40" result="blur"/>
      <feOffset dx="0" dy="-30" result="offsetBlur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feComposite in="shadow" in2="SourceGraphic" operator="over"/>
    </filter>
    <!-- Bar shadow for depth -->
    <filter id="barShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#082a6a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <g clip-path="url(#iconClip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <!-- Subtle top highlight -->
    <rect width="1024" height="512" fill="url(#bg)" opacity="0"/>
    <ellipse cx="512" cy="0" rx="600" ry="300" fill="white" opacity="0.06"/>
    <!-- Subtle bottom darken -->
    <ellipse cx="512" cy="1024" rx="700" ry="300" fill="#000" opacity="0.1"/>
  </g>

  <!-- Waveform bars — asymmetric to suggest slowing down (wider spacing right side) -->
  <g clip-path="url(#iconClip)" filter="url(#barShadow)">
    <!-- Center line (subtle) -->
    <line x1="140" y1="512" x2="884" y2="512" stroke="white" stroke-opacity="0.1" stroke-width="2"/>

    <!-- Waveform bars — fewer, thicker, wider spacing toward right = "slowing down" -->
    <!-- Left cluster (tight/fast) -->
    <rect x="150" y="380" width="32" height="264" rx="16" fill="white" opacity="0.95"/>
    <rect x="198" y="310" width="32" height="404" rx="16" fill="white" opacity="0.95"/>
    <rect x="246" y="260" width="32" height="504" rx="16" fill="white" opacity="0.95"/>

    <!-- Middle cluster -->
    <rect x="300" y="210" width="34" height="604" rx="17" fill="white" opacity="0.95"/>
    <rect x="356" y="180" width="34" height="664" rx="17" fill="white" opacity="1"/>
    <rect x="412" y="200" width="34" height="624" rx="17" fill="white" opacity="1"/>
    <rect x="468" y="240" width="34" height="544" rx="17" fill="white" opacity="0.95"/>

    <!-- Right cluster (wider spacing = "slowed down") -->
    <rect x="536" y="280" width="36" height="464" rx="18" fill="white" opacity="0.9"/>
    <rect x="616" y="340" width="38" height="344" rx="19" fill="white" opacity="0.8"/>
    <rect x="706" y="390" width="40" height="244" rx="20" fill="white" opacity="0.7"/>
    <rect x="806" y="430" width="42" height="164" rx="21" fill="white" opacity="0.6"/>
  </g>

</svg>
