name: ThePlayer
options:
  bundleIdPrefix: com.theplayer
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
settings:
  SWIFT_VERSION: "5.9"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
schemes:
  ThePlayer:
    build:
      targets:
        ThePlayer: all
        ThePlayerTests: [test]
    test:
      targets:
        - ThePlayerTests
targets:
  ThePlayer:
    type: application
    platform: macOS
    sources:
      - ThePlayer
      - path: Resources/Metronome/MetronomeUp.wav
        buildPhase: resources
      - path: Resources/Metronome/MetronomeDown.wav
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.theplayer.app
      PRODUCT_NAME: ThePlayer
      PRODUCT_MODULE_NAME: ThePlayer
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_VALUES:
        CFBundleDisplayName: The Player
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
      SWIFT_OBJC_BRIDGING_HEADER: ThePlayer/ThePlayer-Bridging-Header.h
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/Vendor/essentia/include
        - /opt/homebrew/include
        - /opt/homebrew/include/eigen3
      LIBRARY_SEARCH_PATHS:
        - $(SRCROOT)/Vendor/essentia/lib
        - /opt/homebrew/lib
        - /opt/homebrew/Cellar/fftw/3.3.10_3/lib
        - /opt/homebrew/Cellar/ffmpeg/8.1/lib
        - /opt/homebrew/Cellar/libsamplerate/0.2.2/lib
        - /opt/homebrew/Cellar/taglib/2.2.1/lib
        - /opt/homebrew/Cellar/libyaml/0.2.5/lib
        - /opt/homebrew/Cellar/chromaprint/1.6.0/lib
      OTHER_LDFLAGS:
        - -lessentia
        - -lfftw3f
        - -lavformat
        - -lavcodec
        - -lavutil
        - -lswresample
        - -lsamplerate
        - -ltag
        - -lyaml
        - -lchromaprint
        - -lz
        - -lc++
      OTHER_CPLUSPLUSFLAGS:
        - -std=c++17
  ThePlayerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ThePlayerTests
    resources:
      - Resources/test-audio.wav
    dependencies:
      - target: ThePlayer
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.theplayer.tests
      GENERATE_INFOPLIST_FILE: YES
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ThePlayer.app/Contents/MacOS/ThePlayer"
      BUNDLE_LOADER: "$(TEST_HOST)"
