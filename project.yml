name: ThePlayer
options:
  bundleIdPrefix: com.theplayer
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
settings:
  SWIFT_VERSION: "5.9"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
schemes:
  ThePlayer:
    build:
      targets:
        ThePlayer: all
        ThePlayerTests: [test]
    test:
      targets:
        - ThePlayerTests
targets:
  ThePlayer:
    type: application
    platform: macOS
    sources:
      - ThePlayer
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.theplayer.app
      PRODUCT_NAME: ThePlayer
      PRODUCT_MODULE_NAME: ThePlayer
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_VALUES:
        CFBundleDisplayName: The Player
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
      SWIFT_OBJC_BRIDGING_HEADER: ThePlayer/ThePlayer-Bridging-Header.h
  ThePlayerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ThePlayerTests
    resources:
      - Resources/test-audio.wav
    dependencies:
      - target: ThePlayer
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.theplayer.tests
      GENERATE_INFOPLIST_FILE: YES
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ThePlayer.app/Contents/MacOS/ThePlayer"
      BUNDLE_LOADER: "$(TEST_HOST)"
